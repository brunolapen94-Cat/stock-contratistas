<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock General SAP</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #0a0d14;
      --surface: #111620;
      --surface2: #161c2a;
      --border: rgba(255,255,255,.08);
      --text: #e8edf5;
      --muted: #91a0bd;
      --blue: #3b82f6;
      --cyan: #06b6d4;
      --green: #10b981;
      --red: #ef4444;
      --amber: #f59e0b;
      --violet: #8b5cf6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.12), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(139,92,246,.10), transparent 34rem),
        var(--bg);
      color: var(--text);
    }

    .layout { max-width: 1720px; margin: 0 auto; padding: 32px; }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .brand { display: flex; align-items: center; gap: 14px; }

    .brand-icon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      font-size: 17px;
      font-weight: 900;
      box-shadow: 0 0 26px rgba(59,130,246,.32);
    }

    h1 { margin: 0; font-size: 25px; line-height: 1.15; }
    .subtitle { margin-top: 4px; color: var(--muted); font-size: 13px; }

    .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(16,185,129,.25);
      background: rgba(16,185,129,.1);
      color: #75e7bd;
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 12px;
      font-weight: 700;
    }

    .status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
    }

    .btn {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      padding: 10px 15px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover { border-color: rgba(255,255,255,.18); }
    .btn-green { background: rgba(16,185,129,.14); border-color: rgba(16,185,129,.25); color: #8cf2cb; }

    .tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 22px;
      padding: 6px;
      width: fit-content;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(17,22,32,.84);
    }

    .tab-btn {
      min-width: 150px;
      border: 0;
      border-radius: 10px;
      padding: 11px 16px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .tab-btn.active {
      color: white;
      background: linear-gradient(135deg, rgba(59,130,246,.95), rgba(6,182,212,.88));
      box-shadow: 0 8px 22px rgba(59,130,246,.20);
    }

    .upload {
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
      padding: 24px 26px;
      text-align: center;
      border: 2px dashed var(--border);
      border-radius: 18px;
      background: var(--surface);
    }

    .upload.loaded { border-color: rgba(16,185,129,.65); background: rgba(16,185,129,.06); }
    .upload.error { border-color: rgba(239,68,68,.65); background: rgba(239,68,68,.06); }
    .upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-title { margin: 8px 0 4px; font-weight: 800; font-size: 15px; }
    .upload-sub { color: var(--muted); font-size: 13px; }

    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .kpi {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
      padding: 20px;
    }

    .kpi::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
    }

    .kpi.transit::before { background: linear-gradient(90deg, var(--amber), var(--cyan)); }
    .kpi-label { color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; }
    .kpi-value { margin-top: 8px; font-size: 31px; font-weight: 800; }

    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
    .search { flex: 1; min-width: 260px; }

    input, select {
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    input:focus, select:focus { border-color: rgba(59,130,246,.75); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
    .hidden { display: none; }

    .table-card { overflow: hidden; border: 1px solid var(--border); border-radius: 18px; background: var(--surface); }
    .table-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }
    .table-meta b { color: var(--text); }
    .table-scroll { overflow: auto; max-height: 68vh; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 13px 15px; border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 13px; }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--surface2);
      color: var(--muted);
      text-align: left;
      text-transform: uppercase;
      letter-spacing: .75px;
      font-size: 11px;
      cursor: pointer;
      user-select: none;
    }
    tbody tr:hover { background: rgba(255,255,255,.035); }

    .desc { min-width: 280px; white-space: normal; color: #cbd5e1; }
    .mono { font-family: Consolas, Monaco, monospace; }
    .material { color: #93c5fd; font-weight: 700; }
    .stock-pos { color: var(--green); font-weight: 800; }
    .stock-zero { color: var(--red); font-weight: 800; }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      border: 1px solid var(--border);
    }
    .badge-blue { color: #93c5fd; background: rgba(59,130,246,.14); border-color: rgba(59,130,246,.22); }
    .badge-violet { color: #c4b5fd; background: rgba(139,92,246,.14); border-color: rgba(139,92,246,.22); }
    .badge-red { color: #fca5a5; background: rgba(239,68,68,.14); border-color: rgba(239,68,68,.22); }
    .badge-amber { color: #fcd34d; background: rgba(245,158,11,.14); border-color: rgba(245,158,11,.22); }
    .badge-muted { color: var(--muted); background: rgba(137,147,168,.1); }

    .empty { padding: 58px 20px; text-align: center; color: var(--muted); }
    .pager { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; padding: 14px 18px; border-top: 1px solid var(--border); }
    .pages { display: flex; gap: 6px; flex-wrap: wrap; }
    .page-btn { min-width: 34px; height: 34px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); color: var(--text); cursor: pointer; }
    .page-btn.active { background: var(--blue); border-color: var(--blue); color: white; }
    .page-btn:disabled { opacity: .35; cursor: default; }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 20;
      max-width: 360px;
      padding: 13px 16px;
      border: 1px solid var(--border);
      border-left: 4px solid var(--green);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 12px 36px rgba(0,0,0,.35);
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      font-size: 14px;
      font-weight: 700;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 760px) {
      .layout { padding: 18px; }
      .tabs { width: 100%; }
      .tab-btn { flex: 1; min-width: 0; }
      .kpis { grid-template-columns: repeat(2, 1fr); }
      .toolbar { flex-direction: column; }
      .search, select, .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="layout">
    <header class="header">
      <div class="brand">
        <div class="brand-icon">SAP</div>
        <div>
          <h1>Stock General SAP</h1>
          <div class="subtitle">Inventario y transitos para contratistas</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="status" id="statusText">Cargando archivos</div>
        <button class="btn" type="button" onclick="recargarTodo()">Actualizar</button>
        <button class="btn btn-green" type="button" onclick="exportarExcel()">Exportar vista</button>
      </div>
    </header>

    <nav class="tabs" aria-label="Vistas">
      <button class="tab-btn active" id="tabStock" type="button" onclick="cambiarVista('stock')">Stock actual</button>
      <button class="tab-btn" id="tabTransit" type="button" onclick="cambiarVista('transit')">Transitos proximos</button>
    </nav>

    <section class="upload" id="uploadZone">
      <input type="file" id="excelFile" accept=".xlsx,.xls" />
      <div class="upload-title" id="uploadTitle">Cargando stock.xlsx y transitos.xlsx...</div>
      <div class="upload-sub" id="uploadSub">La pagina lee automaticamente los archivos publicados junto al HTML</div>
    </section>

    <section class="kpis" id="kpiGrid"></section>

    <section class="toolbar">
      <input class="search" id="searchInput" type="search" placeholder="Buscar material, contratista, centro, almacen..." />
      <select id="filterCentro"><option value="">Todos los centros</option></select>
      <select id="filterContratista"><option value="">Todos los contratistas</option></select>
      <select id="filterUnidad"><option value="">Todas las unidades</option></select>
      <select id="filterExtra"><option value="">Todos</option></select>
      <button class="btn" type="button" onclick="limpiarFiltros()">Limpiar</button>
    </section>

    <section class="table-card">
      <div class="table-meta">
        <div>Mostrando <b id="countVisible">0</b> de <b id="countTotal">0</b> registros</div>
        <label>
          Filas:
          <select id="rowsPerPage" onchange="cambiarPagina(1)">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="999999">Todas</option>
          </select>
        </label>
      </div>

      <div class="table-scroll">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="empty" id="emptyState">Todavia no hay datos cargados.</div>

      <div class="pager" id="pager" style="display:none">
        <div class="subtitle" id="pageInfo"></div>
        <div class="pages" id="pageControls"></div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const FILES = {
      stock: './stock.xlsx',
      transit: './transitos.xlsx',
    };
    const AUTO_REFRESH_MINUTES = 5;

    const state = {
      view: 'stock',
      stockRows: [],
      transitRows: [],
      filteredRows: [],
      currentPage: 1,
      sortKey: '',
      sortDir: 1,
      loadedAt: null,
    };

    const viewConfig = {
      stock: {
        empty: 'No hay stock cargado.',
        extraLabel: 'Todos los ARATOS',
        extraKey: 'arato',
        showContratistaFilter: true,
        showExtraFilter: true,
        kpis: [
          ['Materiales', rows => rows.length],
          ['Centros', rows => uniqueCount(rows, 'centro')],
          ['Contratistas', rows => uniqueCount(rows, 'contratista')],
          ['ARATOS', rows => uniqueCount(rows, 'arato')],
        ],
        columns: [
          ['material', 'Material'],
          ['descripcion', 'Descripcion'],
          ['centro', 'Centro'],
          ['almacen', 'Almacen'],
          ['lote', 'Lote'],
          ['stock', 'Stock'],
          ['unidad', 'Unidad'],
          ['contratista', 'Contratista'],
          ['arato', 'ARATO / Especial'],
          ['valor', 'Valor'],
          ['moneda', 'Moneda'],
          ['actualizado', 'Actualizado'],
        ],
      },
      transit: {
        empty: 'No hay transitos cargados.',
        extraLabel: 'Todos los ARATOS / Obras',
        extraKey: 'arato',
        showContratistaFilter: false,
        showExtraFilter: true,
        kpis: [
          ['En transito', rows => rows.length],
          ['Catalogos', rows => uniqueCount(rows, 'material')],
          ['Centros', rows => uniqueCount(rows, 'centro')],
          ['ARATOS / Obras', rows => uniqueCount(rows, 'arato')],
        ],
        columns: [
          ['material', 'Catalogo'],
          ['descripcion', 'Descripcion'],
          ['cantidad', 'Cantidad'],
          ['unidad', 'Unidad'],
          ['centro', 'Centro'],
          ['almacen', 'Almacen receptor'],
          ['arato', 'ARATO / Obra'],
          ['fecha', 'Fecha estimada'],
          ['observacion', 'Observacion'],
        ],
      },
    };

    document.getElementById('excelFile').addEventListener('change', event => {
      const file = event.target.files[0];
      if (file) cargarArchivoManual(file);
    });

    document.getElementById('searchInput').addEventListener('input', aplicarFiltros);
    ['filterCentro', 'filterContratista', 'filterUnidad', 'filterExtra'].forEach(id => {
      document.getElementById(id).addEventListener('change', aplicarFiltros);
    });

    async function recargarTodo() {
      setEstado('Actualizando archivos');
      setUpload('Cargando archivos publicados...', 'Leyendo stock.xlsx y transitos.xlsx', 'loading');

      const stock = await cargarExcelRemoto(FILES.stock, 'stock.xlsx', false);
      const transit = await cargarExcelRemoto(FILES.transit, 'transitos.xlsx', true);

      state.stockRows = stock.map(mapStockRow);
      state.transitRows = transit.map(mapTransitRow);
      state.loadedAt = new Date();

      if (!state.stockRows.length && !state.transitRows.length) {
        setUpload('No se pudieron cargar los archivos', 'Verifica que stock.xlsx y transitos.xlsx esten junto a index.html', 'error');
        setEstado('Archivos no disponibles');
        toast('No se pudieron leer los archivos publicados', 'red');
      } else {
        const stockText = `${state.stockRows.length.toLocaleString('es-AR')} stock`;
        const transitText = `${state.transitRows.length.toLocaleString('es-AR')} transitos`;
        setUpload('Archivos cargados correctamente', `${stockText} · ${transitText} · ${state.loadedAt.toLocaleString('es-AR')}`, 'loaded');
        setEstado('Datos actualizados');
        toast('Datos actualizados', 'green');
      }

      prepararVista();
    }

    async function cargarExcelRemoto(url, label, optional) {
      try {
        const response = await fetch(`${url}?v=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const buffer = await response.arrayBuffer();
        return leerExcel(buffer);
      } catch (error) {
        if (!optional) toast(`No se pudo leer ${label}`, 'red');
        return [];
      }
    }

    function cargarArchivoManual(file) {
      const reader = new FileReader();
      reader.onload = event => {
        const rows = leerExcel(event.target.result);
        if (state.view === 'stock') state.stockRows = rows.map(mapStockRow);
        else state.transitRows = rows.map(mapTransitRow);
        state.loadedAt = new Date();
        setUpload(`${file.name} cargado manualmente`, `${rows.length.toLocaleString('es-AR')} registros`, 'loaded');
        prepararVista();
      };
      reader.readAsArrayBuffer(file);
    }

    function leerExcel(buffer) {
      const workbook = XLSX.read(new Uint8Array(buffer), { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      return XLSX.utils.sheet_to_json(sheet, { defval: '' });
    }

    function cambiarVista(view) {
      state.view = view;
      state.sortKey = '';
      state.sortDir = 1;
      state.currentPage = 1;
      document.getElementById('tabStock').classList.toggle('active', view === 'stock');
      document.getElementById('tabTransit').classList.toggle('active', view === 'transit');
      prepararVista();
    }

    function prepararVista() {
      renderHead();
      renderKPIs();
      generarFiltros();
      aplicarFiltros();
    }

    function filasActuales() {
      return state.view === 'stock' ? state.stockRows : state.transitRows;
    }

    function configActual() {
      return viewConfig[state.view];
    }

    function renderHead() {
      const config = configActual();
      document.getElementById('tableHead').innerHTML = `<tr>${config.columns.map(([key, label]) => (
        `<th onclick="ordenar('${key}')">${label}</th>`
      )).join('')}</tr>`;
      document.getElementById('emptyState').textContent = config.empty;
      document.getElementById('filterContratista').classList.toggle('hidden', !config.showContratistaFilter);
      document.getElementById('filterExtra').classList.toggle('hidden', !config.showExtraFilter);
      document.getElementById('filterExtra').options[0].textContent = config.extraLabel;
      document.getElementById('searchInput').placeholder = state.view === 'stock'
        ? 'Buscar material, contratista, centro, almacen...'
        : 'Buscar catalogo, centro, almacen receptor, ARATO...';
    }

    function renderKPIs() {
      const rows = filasActuales();
      document.getElementById('kpiGrid').innerHTML = configActual().kpis.map(([label, calc]) => (
        `<div class="kpi ${state.view === 'transit' ? 'transit' : ''}">
          <div class="kpi-label">${escapeHtml(label)}</div>
          <div class="kpi-value">${Number(calc(rows) || 0).toLocaleString('es-AR')}</div>
        </div>`
      )).join('');
    }

    function generarFiltros() {
      const rows = filasActuales();
      llenarSelect('filterCentro', valoresUnicos(rows, 'centro'), 'Todos los centros');
      llenarSelect('filterContratista', valoresUnicos(rows, 'contratista'), 'Todos los contratistas');
      llenarSelect('filterUnidad', valoresUnicos(rows, 'unidad'), 'Todas las unidades');
      llenarSelect('filterExtra', valoresUnicos(rows, configActual().extraKey), configActual().extraLabel);
    }

    function aplicarFiltros() {
      const rows = filasActuales();
      const config = configActual();
      const text = normalizar(document.getElementById('searchInput').value);
      const centro = document.getElementById('filterCentro').value;
      const contratista = config.showContratistaFilter ? document.getElementById('filterContratista').value : '';
      const unidad = document.getElementById('filterUnidad').value;
      const extra = config.showExtraFilter ? document.getElementById('filterExtra').value : '';
      const extraKey = config.extraKey;

      state.filteredRows = rows.filter(row => {
        const haystack = normalizar(Object.values(row).join(' '));
        return (!text || haystack.includes(text))
          && (!centro || String(row.centro) === centro)
          && (!contratista || String(row.contratista) === contratista)
          && (!unidad || String(row.unidad) === unidad)
          && (!extra || String(row[extraKey]) === extra);
      });

      if (state.sortKey) ordenarDatos();
      state.currentPage = 1;
      renderTabla();
    }

    function ordenar(key) {
      if (state.sortKey === key) state.sortDir *= -1;
      else {
        state.sortKey = key;
        state.sortDir = 1;
      }
      ordenarDatos();
      state.currentPage = 1;
      renderTabla();
    }

    function ordenarDatos() {
      state.filteredRows.sort((a, b) => {
        const va = a[state.sortKey] ?? '';
        const vb = b[state.sortKey] ?? '';
        return String(va).localeCompare(String(vb), 'es', { numeric: true }) * state.sortDir;
      });
    }

    function renderTabla() {
      const tbody = document.getElementById('tableBody');
      const empty = document.getElementById('emptyState');
      const pager = document.getElementById('pager');
      const rowsPerPage = Number(document.getElementById('rowsPerPage').value);
      const total = state.filteredRows.length;
      const totalPages = Math.max(1, Math.ceil(total / rowsPerPage));

      document.getElementById('countVisible').textContent = total.toLocaleString('es-AR');
      document.getElementById('countTotal').textContent = filasActuales().length.toLocaleString('es-AR');

      if (state.currentPage > totalPages) state.currentPage = totalPages;

      if (!total) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        pager.style.display = 'none';
        return;
      }

      empty.style.display = 'none';
      pager.style.display = 'flex';

      const start = (state.currentPage - 1) * rowsPerPage;
      const rows = state.filteredRows.slice(start, start + rowsPerPage);
      tbody.innerHTML = rows.map(row => `<tr>${configActual().columns.map(([key]) => renderCell(key, row)).join('')}</tr>`).join('');

      renderPaginacion(total, rowsPerPage, totalPages);
    }

    function renderCell(key, row) {
      const value = row[key] || '-';
      if (key === 'material') return `<td><span class="mono material">${escapeHtml(value)}</span></td>`;
      if (key === 'descripcion' || key === 'observacion') return `<td class="desc">${escapeHtml(value)}</td>`;
      if (key === 'centro') return `<td><span class="badge badge-blue">${escapeHtml(value)}</span></td>`;
      if (key === 'contratista') return `<td><span class="badge badge-violet">${escapeHtml(value)}</span></td>`;
      if (key === 'arato') return `<td><span class="badge ${row.arato ? 'badge-amber' : 'badge-muted'}">${escapeHtml(row.arato || '-')}</span></td>`;
      if (key === 'stock') return `<td><span class="mono ${toNumber(value) <= 0 ? 'stock-zero' : 'stock-pos'}">${escapeHtml(value)}</span></td>`;
      if (key === 'cantidad') return `<td><span class="mono stock-pos">${escapeHtml(value)}</span></td>`;
      if (key === 'valor') return `<td><span class="mono">${escapeHtml(formatValor(value))}</span></td>`;
      return `<td>${escapeHtml(value)}</td>`;
    }

    function renderPaginacion(total, rowsPerPage, totalPages) {
      const start = (state.currentPage - 1) * rowsPerPage + 1;
      const end = Math.min(state.currentPage * rowsPerPage, total);
      document.getElementById('pageInfo').textContent = `${start.toLocaleString('es-AR')}-${end.toLocaleString('es-AR')} de ${total.toLocaleString('es-AR')}`;

      const controls = document.getElementById('pageControls');
      const buttons = [];
      buttons.push(`<button class="page-btn" onclick="cambiarPagina(${state.currentPage - 1})" ${state.currentPage === 1 ? 'disabled' : ''}>‹</button>`);
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || Math.abs(i - state.currentPage) <= 1) {
          buttons.push(`<button class="page-btn ${i === state.currentPage ? 'active' : ''}" onclick="cambiarPagina(${i})">${i}</button>`);
        } else if (Math.abs(i - state.currentPage) === 2) {
          buttons.push(`<span class="subtitle" style="padding:8px 2px">...</span>`);
        }
      }
      buttons.push(`<button class="page-btn" onclick="cambiarPagina(${state.currentPage + 1})" ${state.currentPage === totalPages ? 'disabled' : ''}>›</button>`);
      controls.innerHTML = buttons.join('');
    }

    function cambiarPagina(page) {
      const rowsPerPage = Number(document.getElementById('rowsPerPage').value);
      const totalPages = Math.max(1, Math.ceil(state.filteredRows.length / rowsPerPage));
      if (page < 1 || page > totalPages) return;
      state.currentPage = page;
      renderTabla();
    }

    function limpiarFiltros() {
      document.getElementById('searchInput').value = '';
      ['filterCentro', 'filterContratista', 'filterUnidad', 'filterExtra'].forEach(id => {
        document.getElementById(id).value = '';
      });
      aplicarFiltros();
    }

    function exportarExcel() {
      if (!state.filteredRows.length) {
        toast('No hay datos para exportar', 'red');
        return;
      }
      const worksheet = XLSX.utils.json_to_sheet(state.filteredRows);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, state.view === 'stock' ? 'Stock' : 'Transitos');
      XLSX.writeFile(workbook, `${state.view === 'stock' ? 'stock' : 'transitos'}_vista_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    function mapStockRow(row) {
      return {
        material: get(row, ['material']),
        descripcion: get(row, ['texto breve de material', 'texto breve', 'descripcion', 'descripción']),
        centro: get(row, ['centro']),
        almacen: get(row, ['almacen', 'almacén']),
        lote: get(row, ['lote']),
        stock: get(row, ['libre utilizacion', 'libre utilización', 'stock']),
        unidad: get(row, ['unidad medida base', 'umb', 'unidad']),
        contratista: get(row, ['denominacion almacen', 'denominación almacén', 'contratista']),
        arato: get(row, ['numero de stock especial', 'número de stock especial', 'stock especial', 'arato', 'especial']),
        valor: get(row, ['valor libre util', 'valor libre', 'valor']),
        moneda: get(row, ['moneda']),
        actualizado: new Date().toLocaleDateString('es-AR'),
      };
    }

    function mapTransitRow(row) {
      return {
        material: get(row, ['catalogo', 'catálogo', 'catalogos', 'catálogos', 'material', 'codigo material', 'código material']),
        descripcion: get(row, ['texto breve de material', 'texto breve', 'descripcion', 'descripción']),
        cantidad: get(row, ['cantidad', 'cant', 'stock', 'libre utilizacion', 'libre utilización']),
        unidad: get(row, ['unidad medida base', 'umb', 'unidad']),
        centro: get(row, ['centro receptor', 'centro destino', 'centro']),
        almacen: get(row, ['almacen receptor', 'almacén receptor', 'almacen destino', 'almacén destino', 'receptor']),
        arato: get(row, ['arato', 'obra', 'nro obra', 'número de obra', 'numero de obra', 'stock especial', 'numero de stock especial', 'número de stock especial']),
        fecha: formatFecha(get(row, ['fecha estimada', 'fecha eta', 'eta', 'fecha', 'entrega'])),
        observacion: get(row, ['observacion', 'observación', 'comentario', 'detalle']),
      };
    }

    function get(row, names) {
      const keys = Object.keys(row);
      for (const name of names) {
        const target = normalizar(name);
        const key = keys.find(k => normalizar(k).includes(target));
        if (key !== undefined) return row[key];
      }
      return '';
    }

    function normalizar(texto) {
      return String(texto ?? '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim();
    }

    function valoresUnicos(rows, key) {
      return [...new Set(rows.map(row => row[key]).filter(Boolean).map(String))]
        .sort((a, b) => a.localeCompare(b, 'es', { numeric: true }));
    }

    function llenarSelect(id, valores, placeholder) {
      const select = document.getElementById(id);
      select.innerHTML = '';
      const first = document.createElement('option');
      first.value = '';
      first.textContent = placeholder;
      select.appendChild(first);
      valores.forEach(valor => {
        const option = document.createElement('option');
        option.value = valor;
        option.textContent = valor;
        select.appendChild(option);
      });
    }

    function uniqueCount(rows, key) {
      return new Set(rows.map(row => row[key]).filter(Boolean)).size;
    }

    function parseFecha(value) {
      if (!value) return null;
      if (value instanceof Date) return startOfDay(value);
      if (typeof value === 'number') {
        const parsed = XLSX.SSF.parse_date_code(value);
        if (!parsed) return null;
        return startOfDay(new Date(parsed.y, parsed.m - 1, parsed.d));
      }
      const text = String(value).trim();
      const parts = text.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
      if (parts) {
        const year = Number(parts[3].length === 2 ? `20${parts[3]}` : parts[3]);
        return startOfDay(new Date(year, Number(parts[2]) - 1, Number(parts[1])));
      }
      const date = new Date(text);
      return Number.isNaN(date.getTime()) ? null : startOfDay(date);
    }

    function formatFecha(value) {
      const date = parseFecha(value);
      return date ? date.toLocaleDateString('es-AR') : value;
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function toNumber(value) {
      const clean = String(value ?? '')
        .replace(/\./g, '')
        .replace(',', '.')
        .replace(/[^\d.-]/g, '');
      return Number(clean) || 0;
    }

    function formatValor(value) {
      const number = toNumber(value);
      if (!number && String(value).trim() !== '0') return value;
      return number.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;',
      }[char]));
    }

    function setEstado(text) {
      document.getElementById('statusText').textContent = text;
    }

    function setUpload(title, sub, mode) {
      const zone = document.getElementById('uploadZone');
      zone.classList.toggle('loaded', mode === 'loaded' || mode === 'loading');
      zone.classList.toggle('error', mode === 'error');
      document.getElementById('uploadTitle').textContent = title;
      document.getElementById('uploadSub').textContent = sub;
    }

    function toast(message, type = 'green') {
      const el = document.getElementById('toast');
      el.textContent = message;
      el.style.borderLeftColor = type === 'red' ? 'var(--red)' : 'var(--green)';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    renderHead();
    renderKPIs();
    renderTabla();
    recargarTodo();
    setInterval(recargarTodo, AUTO_REFRESH_MINUTES * 60 * 1000);
  </script>
</body>
</html>
